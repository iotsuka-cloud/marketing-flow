let _n=100,_e=100,_s=100;
const uid=()=>'n'+(++_n), euid=()=>'e'+(++_e), suid=()=>'s'+(++_s);
const cx=n=>n.x+n.w/2, cy=n=>n.y+n.h/2;

function ports(a,b){
  const dx=cx(b)-cx(a), dy=cy(b)-cy(a);
  if(Math.abs(dy)>=Math.abs(dx)){
    return dy>=0?[{x:cx(a),y:a.y+a.h},{x:cx(b),y:b.y}]:[{x:cx(a),y:a.y},{x:cx(b),y:b.y+b.h}];
  }
  return dx>=0?[{x:a.x+a.w,y:cy(a)},{x:b.x,y:cy(b)}]:[{x:a.x,y:cy(a)},{x:b.x+b.w,y:cy(b)}];
}

/* ===== Flow コンポーネント ===== */
function FlowEdge({edge,nodes,sel,onClick}){
  const a=nodes.find(n=>n.id===edge.from), b=nodes.find(n=>n.id===edge.to);
  if(!a||!b) return null;
  const [p1,p2]=ports(a,b), m={x:(p1.x+p2.x)/2,y:(p1.y+p2.y)/2};
  const d='M'+p1.x+','+p1.y+' C'+p1.x+','+m.y+' '+p2.x+','+m.y+' '+p2.x+','+p2.y;
  return (
    <g onClick={e=>{e.stopPropagation();onClick(edge.id);}} style={{cursor:'pointer'}}>
      <path d={d} fill="none" stroke="transparent" strokeWidth={12}/>
      <path d={d} fill="none" stroke={sel?'#534AB7':'#B4B2A9'} strokeWidth={sel?2:1.5}
        strokeDasharray={edge.dashed?'6 4':'none'} markerEnd="url(#arr)"/>
      {edge.label&&<text x={m.x} y={m.y-7} textAnchor="middle" fontSize={11} fill="#888780">{edge.label}</text>}
    </g>
  );
}

function FlowNode({node,sel,conn,onMD,onDbl}){
  const c=FC[node.color]||FC.blue;
  const lY=node.url?node.y+node.h*0.32:(node.sub?node.y+node.h*0.36:node.y+node.h/2);
  return (
    <g onMouseDown={e=>onMD(e,node.id)} onDoubleClick={e=>onDbl(e,node.id)} style={{cursor:conn?'crosshair':'grab'}}>
      <rect x={node.x} y={node.y} width={node.w} height={node.h} rx={8}
        fill={c.bg} stroke={sel?c.ac:c.bd} strokeWidth={sel?2:1}/>
      <text x={cx(node)} y={lY} textAnchor="middle" dominantBaseline="central"
        fontSize={13} fontWeight={500} fill={c.tx}>{node.label}</text>
      {node.sub&&<text x={cx(node)} y={node.y+node.h*0.7} textAnchor="middle"
        dominantBaseline="central" fontSize={11} fill={c.tx} opacity={0.75}>{node.sub}</text>}
      {node.url&&<foreignObject x={node.x+6} y={node.y+node.h-22} width={node.w-12} height={18}>
        <a xmlns="http://www.w3.org/1999/xhtml" href={node.url} target="_blank" rel="noopener noreferrer"
          onClick={e=>e.stopPropagation()}
          style={{fontSize:'10px',color:'#185FA5',textDecoration:'underline',display:'block',
            textAlign:'center',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',lineHeight:'18px'}}>
          {node.url}
        </a>
      </foreignObject>}
    </g>
  );
}

function FlowEdit({node,onU,onD,onC}){
  const[l,setL]=useState(node.label);
  const[s,setS]=useState(node.sub||'');
  const[col,setCol]=useState(node.color||'blue');
  const[u,setU]=useState(node.url||'');
  const si={width:'100%',padding:'7px 10px',borderRadius:6,border:'1px solid #ddd',fontSize:13,marginTop:3,outline:'none'};
  return (
    <div style={{position:'absolute',top:8,right:8,width:230,background:'#fff',borderRadius:10,
      boxShadow:'0 4px 20px rgba(0,0,0,.15)',padding:16,zIndex:50,border:'1px solid #eee'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <span style={{fontSize:13,fontWeight:600}}>ノードを編集</span>
        <button onClick={onC} style={{background:'none',border:'none',fontSize:18,color:'#aaa'}}>×</button>
      </div>
      {[['ラベル',l,setL],['サブテキスト',s,setS],['URL（任意）',u,setU]].map(([lb,v,sv])=>(
        <div key={lb} style={{marginBottom:10}}>
          <div style={{fontSize:11,color:'#888'}}>{lb}</div>
          <input value={v} onChange={e=>sv(e.target.value)} style={si}/>
        </div>
      ))}
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,color:'#888',marginBottom:6}}>カラー</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {Object.entries(FC).map(([k,cv])=>(
            <div key={k} onClick={()=>setCol(k)} style={{width:22,height:22,borderRadius:5,background:cv.ac,cursor:'pointer',
              border:col===k?'2.5px solid #333':'2.5px solid transparent'}}/>
          ))}
        </div>
      </div>
      <button onClick={()=>onU({...node,label:l,sub:s,color:col,url:u,h:u&&!node.url?68:(!u&&node.url?44:node.h)})}
        style={{width:'100%',padding:'8px',borderRadius:6,border:'none',background:'#534AB7',color:'#fff',fontSize:13,fontWeight:600,marginBottom:8}}>
        適用
      </button>
      <button onClick={()=>onD(node.id)}
        style={{width:'100%',padding:'8px',borderRadius:6,border:'1px solid #D85A30',background:'transparent',color:'#993C1D',fontSize:13}}>
        削除
      </button>
    </div>
  );
}

function FlowTab(){
  const[nodes,setNodes]=useState(DN);
  const[edges,setEdges]=useState(DE);
  const[selN,setSelN]=useState(null);
  const[selE,setSelE]=useState(null);
  const[editing,setEditing]=useState(null);
  const[conn,setConn]=useState(null);
  const drag=useRef(null), svgRef=useRef(null);

  const onMD=useCallback((e,id)=>{
    if(conn){
      if(conn!==id) setEdges(es=>[...es,{id:euid(),from:conn,to:id}]);
      setConn(null); return;
    }
    e.stopPropagation(); setSelN(id); setSelE(null); setEditing(null);
    const n=nodes.find(n=>n.id===id), rect=svgRef.current.getBoundingClientRect();
    drag.current={id,ox:e.clientX-n.x-rect.left,oy:e.clientY-n.y-rect.top};
  },[nodes,conn]);

  useEffect(()=>{
    const mv=e=>{
      if(!drag.current) return;
      const rect=svgRef.current.getBoundingClientRect();
      setNodes(ns=>ns.map(n=>n.id===drag.current.id
        ?{...n,x:Math.max(0,e.clientX-drag.current.ox-rect.left),y:Math.max(0,e.clientY-drag.current.oy-rect.top)}:n));
    };
    const up=()=>{drag.current=null;};
    window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
    return()=>{window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up);};
  },[]);

  const upN=n=>{setNodes(ns=>ns.map(x=>x.id===n.id?n:x)); setEditing(null);};
  const delN=id=>{setNodes(ns=>ns.filter(n=>n.id!==id)); setEdges(es=>es.filter(e=>e.from!==id&&e.to!==id)); setSelN(null); setEditing(null);};
  const delE=id=>{setEdges(es=>es.filter(e=>e.id!==id)); setSelE(null);};
  const bb={padding:'7px 14px',borderRadius:7,fontSize:13,fontWeight:600,border:'1px solid #ddd',background:'#fff',color:'#333'};

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 16px',background:'#fff',borderBottom:'1px solid #eee',flexWrap:'wrap'}}>
        <button style={bb} onClick={()=>setNodes(ns=>[...ns,{id:uid(),x:200,y:300,w:160,h:44,label:'新しいノード',sub:'',color:'blue'}])}>＋ ノード追加</button>
        <button style={{...bb,...(conn?{background:'#534AB7',color:'#fff',border:'none'}:{})}}
          onClick={()=>setConn(c=>c?null:selN||'__')}>{conn?'接続先をクリック…':'↗ 矢印を追加'}</button>
        {selE&&<button style={{...bb,border:'1px solid #D85A30',color:'#993C1D'}} onClick={()=>delE(selE)}>矢印を削除</button>}
      </div>
      {conn&&<div style={{background:'#EEEDFE',borderBottom:'1px solid #534AB7',padding:'6px 16px',fontSize:12,color:'#3C3489'}}>接続したいノードをクリックしてください</div>}
      <div style={{flex:1,overflow:'auto',position:'relative'}}>
        <svg ref={svgRef} width={680} height={790}
          style={{display:'block',margin:'24px auto',background:'#fff',borderRadius:12,boxShadow:'0 2px 16px rgba(0,0,0,.08)',cursor:conn?'crosshair':'default'}}
          onClick={()=>{setSelN(null);setSelE(null);setEditing(null);setConn(null);}}>
          <defs>
            <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
              <path d="M2 1L8 5L2 9" fill="none" stroke="#B4B2A9" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </marker>
          </defs>
          {edges.map(e=><FlowEdge key={e.id} edge={e} nodes={nodes} sel={selE===e.id} onClick={id=>{setSelE(id);setSelN(null);setEditing(null);}}/>)}
          {nodes.map(n=><FlowNode key={n.id} node={n} sel={selN===n.id} conn={conn} onMD={onMD} onDbl={(e,id)=>{e.stopPropagation();setEditing(id);}}/>)}
        </svg>
        {editing&&(()=>{const n=nodes.find(x=>x.id===editing); return n?<FlowEdit node={n} onU={upN} onD={delN} onC={()=>setEditing(null)}/>:null;})()}
      </div>
      <div style={{padding:'7px 16px',background:'#fff',borderTop:'1px solid #eee',fontSize:11,color:'#aaa'}}>
        ダブルクリック：編集 ／ ドラッグ：移動 ／ ↗矢印を追加→ノードクリック：接続 ／ 矢印クリック→削除
      </div>
    </div>
  );
}

function SiteEdge({conn,items,sel,onClick}){
  const a=items.find(i=>i.id===conn.from), b=items.find(i=>i.id===conn.to);
  if(!a||!b) return null;
  const ax=a.x+a.w, ay=a.y+a.h/2, bx=b.x, by=b.y+b.h/2, mx=(ax+bx)/2;
  const d='M'+ax+','+ay+' C'+mx+','+ay+' '+mx+','+by+' '+bx+','+by;
  return (
    <g onClick={e=>{e.stopPropagation();onClick(conn.id);}} style={{cursor:'pointer'}}>
      <path d={d} fill="none" stroke="transparent" strokeWidth={10}/>
      <path d={d} fill="none" stroke={sel?'#534AB7':'#B4B2A9'} strokeWidth={1.5} markerEnd="url(#sarr)"/>
    </g>
  );
}

function SiteBox({item,sel,connMode,onMD,onDbl}){
  const bg=item.bg||'#fff';
  const bd=BD[bg]||'#ccc';
  const tx=TX[bg]||'#333';
  const hasSub = item.sub && item.sub.length > 0;
  const hasUrl = item.url && item.url.length > 0;
  const boxH = item.h || 36;
  const mainY = hasSub ? item.y + boxH * 0.33 : item.y + boxH / 2;

  const handleClick = e => {
    if(hasUrl && !connMode){
      e.stopPropagation();
      window.open(item.url, '_blank');
    }
  };

  return (
    <g onMouseDown={e=>onMD(e,item.id)} onDoubleClick={e=>onDbl(e,item.id)}
      onClick={handleClick}
      style={{cursor:connMode?'crosshair':hasUrl?'pointer':'grab'}}>
      <rect x={item.x} y={item.y} width={item.w} height={boxH} rx={7}
        fill={bg} stroke={sel?'#534AB7':bd} strokeWidth={sel?2:1.5}/>
      <text x={item.x+item.w/2} y={mainY} textAnchor="middle" dominantBaseline="central"
        fontSize={item.fontSize||13} fontWeight={item.bold?600:400} fill={tx}
        fontFamily={item.mono?'monospace':'inherit'}>
        {item.text}
      </text>
      {hasSub && (
        <text x={item.x+item.w/2} y={item.y+boxH*0.68} textAnchor="middle"
          dominantBaseline="central" fontSize={(item.fontSize||13)-2} fill={tx} opacity={0.72}>
          {item.sub}
        </text>
      )}
      {hasUrl && (
        <text x={item.x+item.w/2} y={item.y+boxH-5} textAnchor="middle"
          fontSize={9} fill={tx} opacity={0.55}>
          {'↗ '+item.url.replace('https://','').replace('http://','').substring(0,26)}
        </text>
      )}
    </g>
  );
}

function SiteTextItem({item,sel,onMD,onDbl}){
  return (
    <g onMouseDown={e=>onMD(e,item.id)} onDoubleClick={e=>onDbl(e,item.id)} style={{cursor:'grab'}}>
      {sel&&<rect x={item.x-4} y={item.y-4} width={202} height={(item.fontSize||14)+12} rx={3}
        fill="none" stroke="#534AB7" strokeWidth={1} strokeDasharray="3 2"/>}
      <text x={item.x} y={item.y+(item.fontSize||14)/2+4} fontSize={item.fontSize||14}
        fontWeight={item.bold?600:400} fill={item.color||'#333'}>{item.text}</text>
    </g>
  );
}

function SiteEditPanel({item,onU,onD,onC}){
  const[text,setText]=useState(item.text||'');
  const[sub,setSub]=useState(item.sub||'');
  const[url,setUrl]=useState(item.url||'');
  const[bg,setBg]=useState(item.bg||'#fff');
  const[w,setW]=useState(item.w||150);
  const[h,setH]=useState(item.h||36);
  const[fs,setFs]=useState(item.fontSize||13);
  const[bold,setBold]=useState(item.bold||false);
  const[mono,setMono]=useState(item.mono||false);
  const[color,setColor]=useState(item.color||'#333');
  const isText=item.type==='text';
  const si={width:'100%',padding:'6px 8px',borderRadius:5,border:'1px solid #ddd',fontSize:12,marginTop:2,outline:'none'};
  const row={marginBottom:10};
  const lbl={fontSize:11,color:'#888'};

  return (
    <div style={{position:'absolute',top:8,right:8,width:224,background:'#fff',borderRadius:10,
      boxShadow:'0 4px 20px rgba(0,0,0,.15)',padding:14,zIndex:50,border:'1px solid #eee',
      maxHeight:'90vh',overflowY:'auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <span style={{fontSize:13,fontWeight:600}}>{isText?'テキストを編集':'ボックスを編集'}</span>
        <button onClick={onC} style={{background:'none',border:'none',fontSize:18,color:'#aaa'}}>×</button>
      </div>
      <div style={row}>
        <div style={lbl}>テキスト（メイン）</div>
        <textarea value={text} onChange={e=>setText(e.target.value)} style={{...si,height:48,resize:'vertical'}}/>
      </div>
      {!isText&&(
        <div style={row}>
          <div style={lbl}>サブテキスト（任意）</div>
          <input value={sub} onChange={e=>setSub(e.target.value)} placeholder="補足テキスト" style={si}/>
        </div>
      )}
      {!isText&&(
        <div style={row}>
          <div style={lbl}>URL（クリックで開く・任意）</div>
          <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://..." style={si}/>
        </div>
      )}
      <div style={row}>
        <div style={lbl}>文字サイズ</div>
        <input type="number" value={fs} min={8} max={32} onChange={e=>setFs(+e.target.value)} style={si}/>
      </div>
      <div style={{...row,display:'flex',gap:10}}>
        <label style={{display:'flex',alignItems:'center',gap:4,fontSize:12,cursor:'pointer'}}>
          <input type="checkbox" checked={bold} onChange={e=>setBold(e.target.checked)}/> 太字
        </label>
        {!isText&&(
          <label style={{display:'flex',alignItems:'center',gap:4,fontSize:12,cursor:'pointer'}}>
            <input type="checkbox" checked={mono} onChange={e=>setMono(e.target.checked)}/> 等幅
          </label>
        )}
      </div>
      {!isText&&(
        <>
          <div style={row}>
            <div style={lbl}>幅</div>
            <input type="number" value={w} min={40} max={600} onChange={e=>setW(+e.target.value)} style={si}/>
          </div>
          <div style={row}>
            <div style={lbl}>高さ</div>
            <input type="number" value={h} min={20} max={200} onChange={e=>setH(+e.target.value)} style={si}/>
          </div>
          <div style={row}>
            <div style={lbl}>背景色</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5,marginTop:4}}>
              {PALETTE.map(p=>(
                <div key={p} onClick={()=>setBg(p)} style={{width:20,height:20,borderRadius:4,background:p,cursor:'pointer',
                  border:bg===p?'2.5px solid #534AB7':'1.5px solid #ccc'}}/>
              ))}
            </div>
            <input value={bg} onChange={e=>setBg(e.target.value)} placeholder="#ffffff" style={{...si,marginTop:6}}/>
          </div>
        </>
      )}
      {isText&&(
        <div style={row}>
          <div style={lbl}>文字色</div>
          <input value={color} onChange={e=>setColor(e.target.value)} placeholder="#333333" style={si}/>
        </div>
      )}
      <button onClick={()=>onU({...item,text,sub,url,bg,w:+w,h:+h,fontSize:+fs,bold,mono,color})}
        style={{width:'100%',padding:'8px',borderRadius:6,border:'none',background:'#534AB7',color:'#fff',fontSize:13,fontWeight:600,marginBottom:8}}>
        適用
      </button>
      <button onClick={()=>onD(item.id)}
        style={{width:'100%',padding:'8px',borderRadius:6,border:'1px solid #D85A30',background:'transparent',color:'#993C1D',fontSize:13}}>
        削除
      </button>
    </div>
  );
}

function SiteTab(){
  const[items,setItems]=useState(SITE_INIT);
  const[conns,setConns]=useState(SC_INIT);
  const[selI,setSelI]=useState(null);
  const[selC,setSelC]=useState(null);
  const[editing,setEditing]=useState(null);
  const[connMode,setConnMode]=useState(null);
  const drag=useRef(null), svgRef=useRef(null);

  const onMD=useCallback((e,id)=>{
    if(connMode){
      if(connMode!==id) setConns(cs=>[...cs,{id:suid(),from:connMode,to:id}]);
      setConnMode(null); return;
    }
    e.stopPropagation(); setSelI(id); setSelC(null); setEditing(null);
    const it=items.find(i=>i.id===id), rect=svgRef.current.getBoundingClientRect();
    drag.current={id,ox:e.clientX-it.x-rect.left,oy:e.clientY-it.y-rect.top};
  },[items,connMode]);

  useEffect(()=>{
    const mv=e=>{
      if(!drag.current) return;
      const rect=svgRef.current.getBoundingClientRect();
      setItems(is=>is.map(i=>i.id===drag.current.id
        ?{...i,x:Math.max(0,e.clientX-drag.current.ox-rect.left),y:Math.max(0,e.clientY-drag.current.oy-rect.top)}:i));
    };
    const up=()=>{drag.current=null;};
    window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
    return()=>{window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up);};
  },[]);

  const upI=i=>{setItems(is=>is.map(x=>x.id===i.id?i:x)); setEditing(null);};
  const delI=id=>{setItems(is=>is.filter(i=>i.id!==id)); setConns(cs=>cs.filter(c=>c.from!==id&&c.to!==id)); setSelI(null); setEditing(null);};
  const delC=id=>{setConns(cs=>cs.filter(c=>c.id!==id)); setSelC(null);};

  const addBox=()=>setItems(is=>[...is,{id:suid(),type:'box',x:100,y:100,w:150,h:36,text:'新しいボックス',bg:'#E6F1FB',fontSize:13,bold:false,mono:false,sub:'',url:''}]);
  const addText=()=>setItems(is=>[...is,{id:suid(),type:'text',x:100,y:100,text:'テキスト',fontSize:14,bold:false,color:'#333'}]);

  const bb={padding:'7px 14px',borderRadius:7,fontSize:13,fontWeight:600,border:'1px solid #ddd',background:'#fff',color:'#333'};
  const maxX=items.reduce((m,i)=>Math.max(m,i.x+(i.w||200)),900);
  const maxY=items.reduce((m,i)=>Math.max(m,i.y+(i.h||30)),800);

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 16px',background:'#fff',borderBottom:'1px solid #eee',flexWrap:'wrap'}}>
        <button style={bb} onClick={addBox}>＋ ボックス追加</button>
        <button style={bb} onClick={addText}>＋ テキスト追加</button>
        <button style={{...bb,...(connMode?{background:'#534AB7',color:'#fff',border:'none'}:{})}}
          onClick={()=>setConnMode(c=>c?null:selI||'__')}>
          {connMode?'接続先をクリック…':'↗ 矢印を追加'}
        </button>
        {selC&&<button style={{...bb,border:'1px solid #D85A30',color:'#993C1D'}} onClick={()=>delC(selC)}>矢印を削除</button>}
      </div>
      {connMode&&<div style={{background:'#EEEDFE',borderBottom:'1px solid #534AB7',padding:'6px 16px',fontSize:12,color:'#3C3489'}}>接続したいボックスをクリックしてください</div>}
      <div style={{flex:1,overflow:'auto',position:'relative'}}>
        <svg ref={svgRef} width={Math.max(maxX+60,900)} height={Math.max(maxY+60,820)}
          style={{display:'block',margin:'16px',background:'#fff',borderRadius:12,boxShadow:'0 2px 16px rgba(0,0,0,.08)',cursor:connMode?'crosshair':'default'}}
          onClick={()=>{setSelI(null);setSelC(null);setEditing(null);if(!connMode)return;setConnMode(null);}}>
          <defs>
            <marker id="sarr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
              <path d="M2 1L8 5L2 9" fill="none" stroke="#B4B2A9" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </marker>
          </defs>
          {conns.map(c=><SiteEdge key={c.id} conn={c} items={items} sel={selC===c.id} onClick={id=>{setSelC(id);setSelI(null);setEditing(null);}}/>)}
          {items.map(it=>it.type==='text'
            ?<SiteTextItem key={it.id} item={it} sel={selI===it.id} onMD={onMD} onDbl={(e,id)=>{e.stopPropagation();setEditing(id);}}/>
            :<SiteBox key={it.id} item={it} sel={selI===it.id} connMode={connMode} onMD={onMD} onDbl={(e,id)=>{e.stopPropagation();setEditing(id);}}/>
          )}
        </svg>
        {editing&&(()=>{const it=items.find(x=>x.id===editing); return it?<SiteEditPanel item={it} onU={upI} onD={delI} onC={()=>setEditing(null)}/>:null;})()}
      </div>
      <div style={{padding:'7px 16px',background:'#fff',borderTop:'1px solid #eee',fontSize:11,color:'#aaa'}}>
        ダブルクリック：編集（サブテキスト・URL・色・サイズ変更） ／ ドラッグ：移動 ／ URLありのボックスはクリックでリンクを開く
      </div>
    </div>
  );
}

/* ===== GitHub保存モーダル ===== */
function GithubModal({onClose}){
  const[tok,setTok]=useState('');
  const[st,setSt]=useState('');
  const[saving,setSaving]=useState(false);
  const si={width:'100%',padding:'8px 10px',borderRadius:6,border:'1px solid #ddd',fontSize:13,outline:'none'};
  const save=async()=>{
    if(!tok){setSt('⚠️ Token必須');return;}
    setSaving(true); setSt('保存中...');
    try{
      const g=await fetch('https://api.github.com/repos/iotsuka-cloud/marketing-flow/contents/flow/data.json',{headers:{Authorization:'token '+tok,Accept:'application/vnd.github.v3+json'}});
      let sha;
      if(g.ok){const j=await g.json();sha=j.sha;}
      const p=await fetch('https://api.github.com/repos/iotsuka-cloud/marketing-flow/contents/flow/data.json',{method:'PUT',headers:{Authorization:'token '+tok,'Content-Type':'application/json'},body:JSON.stringify({message:'Save hub data',content:btoa(unescape(encodeURIComponent(JSON.stringify({v:3},null,2)))),...(sha?{sha}:{})})});
      setSt(p.ok?'✅ 保存しました':'❌ エラー');
    }catch(e){setSt('❌ '+e.message);}
    setSaving(false);
  };
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200}}>
      <div style={{background:'#fff',borderRadius:12,padding:28,width:360,boxShadow:'0 8px 40px rgba(0,0,0,.2)'}}>
        <div style={{fontSize:16,fontWeight:600,marginBottom:16}}>💾 GitHubに保存</div>
        <div style={{fontSize:12,color:'#666',marginBottom:4}}>Personal Access Token</div>
        <input type="password" value={tok} onChange={e=>setTok(e.target.value)} placeholder="github_pat_..." style={si}/>
        {st&&<div style={{fontSize:12,marginTop:8,color:st.startsWith('✅')?'#3B6D11':'#993C1D'}}>{st}</div>}
        <div style={{display:'flex',gap:10,marginTop:16}}>
          <button disabled={saving} onClick={save}
            style={{flex:1,padding:'9px',borderRadius:7,border:'none',background:'#534AB7',color:'#fff',fontSize:13,fontWeight:600}}>
            {saving?'保存中...':'保存する'}
          </button>
          <button onClick={onClose}
            style={{flex:1,padding:'9px',borderRadius:7,border:'1px solid #ddd',background:'transparent',color:'#666',fontSize:13}}>
            閉じる
          </button>
        </div>
      </div>
    </div>
  );
}

/* ===== メインApp ===== */
function App(){
  const[tab,setTab]=useState('flow');
  const[showGH,setShowGH]=useState(false);
  const ts=active=>({
    padding:'10px 24px',fontSize:14,fontWeight:600,border:'none',cursor:'pointer',
    background:active?'#fff':'transparent',color:active?'#534AB7':'#888',
    borderBottom:active?'2px solid #534AB7':'2px solid transparent',
  });
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',background:'#fff',borderBottom:'1px solid #eee',flexShrink:0,paddingLeft:16}}>
        <span style={{fontSize:15,fontWeight:700,color:'#222',marginRight:16}}>📊 Marketing Hub</span>
        <button style={ts(tab==='flow')} onClick={()=>setTab('flow')}>データ遷移マップ</button>
        <button style={ts(tab==='site')} onClick={()=>setTab('site')}>サイト構造マップ</button>
        <div style={{flex:1}}/>
        <button onClick={()=>setShowGH(true)}
          style={{margin:'0 16px',padding:'7px 16px',borderRadius:7,border:'none',background:'#534AB7',color:'#fff',fontSize:13,fontWeight:600}}>
          💾 GitHubに保存
        </button>
      </div>
      <div style={{flex:1,overflow:'hidden'}}>
        {tab==='flow'?<FlowTab/>:<SiteTab/>}
      </div>
      {showGH&&<GithubModal onClose={()=>setShowGH(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
