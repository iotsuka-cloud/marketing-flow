function GithubModal({data,onClose}){const[tok,setTok]=useState(""),[owner,setOwner]=useState("iotsuka-cloud"),[repo,setRepo]=useState("marketing-flow"),[path,setPath]=useState("flow/data.json"),[st,setSt]=useState(""),[saving,setSaving]=useState(false);const save=async()=>{if(!tok){setSt("⚠️ Tokenを入力してください");return;}setSaving(true);setSt("保存中...");try{let sha;const g=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{headers:{Authorization:`token ${tok}`,Accept:"application/vnd.github.v3+json"}});if(g.ok){const j=await g.json();sha=j.sha;}const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));const p=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{method:"PUT",headers:{Authorization:`token ${tok}`,"Content-Type":"application/json"},body:JSON.stringify({message:"Update marketing hub data",content,...(sha?{sha}:{})})});setSt(p.ok?"✅ 保存しました！":"❌ "+(await p.json()).message);}catch(e){setSt("❌ "+e.message);}setSaving(false);};const i2={width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid #ddd",fontSize:13,outline:"none",boxSizing:"border-box"};return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}><div style={{background:"#fff",borderRadius:12,padding:28,width:400,boxShadow:"0 8px 40px rgba(0,0,0,.2)"}}><div style={{fontSize:16,fontWeight:600,marginBottom:20}}>💾 GitHub に保存</div>{[["Token *",tok,setTok,"password","ghp_xxx"],["オーナー",owner,setOwner,"text","iotsuka-cloud"],["リポジトリ",repo,setRepo,"text","marketing-flow"],["保存パス",path,setPath,"text","flow/data.json"]].map(([lb,v,sv,tp,ph])=>(<div key={lb} style={{marginBottom:12}}><div style={{fontSize:12,color:"#666",marginBottom:3}}>{lb}</div><input type={tp} value={v} onChange={e=>sv(e.target.value)} placeholder={ph} style={i2}/></div>))}{st&&<div style={{fontSize:12,margin:"8px 0",color:st.startsWith("✅")?"#3B6D11":st.startsWith("❌")?"#993C1D":"#666"}}>{st}</div>}<div style={{display:"flex",gap:10,marginTop:12}}><button onClick={save} disabled={saving} style={{flex:1,padding:"9px",borderRadius:7,border:"none",background:"#534AB7",color:"#fff",fontSize:13,fontWeight:600}}>{saving?"保存中...":"保存する"}</button><button onClick={onClose} style={{flex:1,padding:"9px",borderRadius:7,border:"1px solid #ddd",background:"transparent",color:"#666",fontSize:13}}>キャンセル</button></div></div></div>);}
function App(){const[tab,setTab]=useState("flow"),[showGH,setShowGH]=useState(false);const ts=a=>({padding:"10px 24px",fontSize:14,fontWeight:600,border:"none",cursor:"pointer",background:a?"#fff":"transparent",color:a?"#534AB7":"#888",borderBottom:a?"2px solid #534AB7":"2px solid transparent"});return(<div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}><div style={{display:"flex",alignItems:"center",background:"#fff",borderBottom:"1px solid #eee",flexShrink:0,paddingLeft:16}}><span style={{fontSize:15,fontWeight:700,color:"#222",marginRight:16}}>📊 Marketing Hub</span><button style={ts(tab==="flow")} onClick={()=>setTab("flow")}>データ遷移マップ</button><button style={ts(tab==="site")} onClick={()=>setTab("site")}>サイト構造マップ</button><div style={{flex:1}}/><button onClick={()=>setShowGH(true)} style={{margin:"0 16px",padding:"7px 16px",borderRadius:7,border:"none",background:"#534AB7",color:"#fff",fontSize:13,fontWeight:600}}>💾 GitHubに保存</button></div><div style={{flex:1,overflow:"hidden"}}>{tab==="flow"?<FlowTab/>:<SiteStructureTab/>}</div>{showGH&&<GithubModal data={{version:2}} onClose={()=>setShowGH(false)}/>}</div>);}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
